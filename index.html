<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FavsFilter — Spotify</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #1DB954;
      --black: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --surface3: #222222;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--black); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    #login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 32px; padding: 24px;
      background: radial-gradient(ellipse at 50% 0%, #1db95422 0%, transparent 65%);
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo svg { width: 40px; height: 40px; }
    .logo-text { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text span { color: var(--green); }
    .login-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 48px 40px; max-width: 420px; width: 100%; text-align: center;
      display: flex; flex-direction: column; gap: 20px;
    }
    .login-card h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; line-height: 1.2; }
    .login-card p { color: var(--muted); font-size: 14px; line-height: 1.6; }
    .btn-spotify {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--green); color: #000; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 15px; border: none; border-radius: 50px;
      padding: 16px 32px; cursor: pointer; transition: background 0.2s, transform 0.15s;
      width: 100%;
    }
    .btn-spotify:hover { background: #1ed760; transform: translateY(-1px); }

    #app-screen { display: none; min-height: 100vh; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 32px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px); z-index: 100;
    }
    .header-logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
    .header-logo span { color: var(--green); }
    .user-info { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--muted); }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--surface3); object-fit: cover; }
    .btn-logout {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font-size: 12px; padding: 6px 12px; border-radius: 20px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-logout:hover { border-color: #555; color: var(--text); }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .section-title {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
    }
    .playlists-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 40px; }
    .playlist-card {
      background: var(--surface); border: 2px solid transparent; border-radius: var(--radius);
      padding: 12px; cursor: pointer; transition: border-color 0.2s, background 0.2s;
      display: flex; flex-direction: column; gap: 8px;
    }
    .playlist-card:hover { background: var(--surface2); }
    .playlist-card.active { border-color: var(--green); background: var(--surface2); }
    .playlist-cover { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; background: var(--surface3); }
    .playlist-cover-placeholder {
      width: 100%; aspect-ratio: 1; border-radius: 8px; background: var(--surface3);
      display: flex; align-items: center; justify-content: center; color: var(--muted);
    }
    .playlist-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .playlist-count { font-size: 11px; color: var(--muted); }

    .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 24px; }
    .search-box {
      flex: 1; min-width: 220px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 50px; padding: 10px 18px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--green); }
    .search-box::placeholder { color: var(--muted); }
    .filter-select {
      background: var(--surface); border: 1px solid var(--border); border-radius: 50px;
      padding: 10px 18px; color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 14px; outline: none; cursor: pointer;
    }
    .results-count { font-size: 13px; color: var(--muted); margin-left: auto; }

    .tracks-table { width: 100%; border-collapse: collapse; }
    .tracks-table th {
      text-align: left; font-size: 11px; font-weight: 500; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .track-row { border-bottom: 1px solid #181818; transition: background 0.15s; }
    .track-row:hover { background: var(--surface); }
    .track-row td { padding: 10px 12px; font-size: 14px; vertical-align: middle; }
    .track-num { color: var(--muted); font-size: 13px; width: 36px; }
    .track-info { display: flex; align-items: center; gap: 12px; }
    .track-thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; background: var(--surface3); flex-shrink: 0; }
    .track-title { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
    .track-artist { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
    .track-album { color: var(--muted); font-size: 13px; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-duration { color: var(--muted); font-size: 13px; text-align: right; }
    .track-link { color: var(--green); text-decoration: none; font-size: 18px; opacity: 0.7; transition: opacity 0.2s; }
    .track-link:hover { opacity: 1; }

    .empty-state { text-align: center; padding: 80px 24px; color: var(--muted); }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3; }
    .loading { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 60px; color: var(--muted); font-size: 14px; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 700px) {
      .track-album, th:nth-child(3), td:nth-child(3) { display: none; }
      .track-title { max-width: 180px; }
      header { padding: 14px 16px; }
      .container { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="#1DB954"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 01-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.623.623 0 01.207.857zm1.223-2.722a.78.78 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 01-.973-.519.781.781 0 01.518-.973c3.632-1.102 8.147-.568 11.234 1.328a.78.78 0 01.258 1.073zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.937.937 0 11-.543-1.793c3.527-1.071 9.396-.865 13.105 1.333a.938.938 0 01-.945 1.617z"/></svg>
    <span class="logo-text">Favs<span>Filter</span></span>
  </div>
  <div class="login-card">
    <h1>Filtre suas músicas favoritas</h1>
    <p>Conecte sua conta do Spotify e encontre qualquer música nas suas playlists por nome, artista ou álbum.</p>
    <button class="btn-spotify" onclick="login()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="black"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.623.623 0 01-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.623.623 0 01.207.857zm1.223-2.722a.78.78 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 01-.973-.519.781.781 0 01.518-.973c3.632-1.102 8.147-.568 11.234 1.328a.78.78 0 01.258 1.073zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.937.937 0 11-.543-1.793c3.527-1.071 9.396-.865 13.105 1.333a.938.938 0 01-.945 1.617z"/></svg>
      Entrar com Spotify
    </button>
  </div>
</div>

<div id="app-screen">
  <header>
    <div class="header-logo">Favs<span>Filter</span></div>
    <div class="user-info">
      <img id="user-avatar" class="user-avatar" src="" alt=""/>
      <span id="user-name"></span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </header>
  <div class="container">
    <p class="section-title">Suas Playlists</p>
    <div id="playlists-grid" class="playlists-grid"></div>
    <div id="tracks-section" style="display:none">
      <div class="filter-bar">
        <input class="search-box" id="search-input" type="text" placeholder="🔍  Buscar por música, artista ou álbum…" oninput="filterTracks()"/>
        <select class="filter-select" id="sort-select" onchange="filterTracks()">
          <option value="default">Ordem original</option>
          <option value="name">Nome A→Z</option>
          <option value="artist">Artista A→Z</option>
          <option value="album">Álbum A→Z</option>
          <option value="duration">Duração</option>
        </select>
        <span class="results-count" id="results-count"></span>
      </div>
      <div id="tracks-container"></div>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = 'd2e2b56147e4423a90b96cda3d139dff';
const REDIRECT_URI = 'https://luizmichelininetto-cell.github.io/favsfilter';
const SCOPES = 'user-read-private user-read-email playlist-read-private playlist-read-collaborative';

let accessToken = null;
let allTracks = [];

// ── PKCE helpers ──
function base64url(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function generateCodeVerifier() {
  const array = new Uint8Array(64);
  crypto.getRandomValues(array);
  return base64url(array);
}

async function generateCodeChallenge(verifier) {
  const encoder = new TextEncoder();
  const data = encoder.encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return base64url(digest);
}

// ── AUTH ──
async function login() {
  const verifier = await generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  const state = Math.random().toString(36).slice(2);

  sessionStorage.setItem('pkce_verifier', verifier);
  sessionStorage.setItem('oauth_state', state);

  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: 'code',
    redirect_uri: REDIRECT_URI,
    scope: SCOPES,
    state: state,
    code_challenge_method: 'S256',
    code_challenge: challenge,
  });

  window.location = 'https://accounts.spotify.com/authorize?' + params.toString();
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const body = new URLSearchParams({
    grant_type: 'authorization_code',
    code,
    redirect_uri: REDIRECT_URI,
    client_id: CLIENT_ID,
    code_verifier: verifier,
  });

  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString(),
  });

  const data = await res.json();
  if (data.access_token) {
    const expires = Date.now() + data.expires_in * 1000;
    sessionStorage.setItem('spotify_token', data.access_token);
    sessionStorage.setItem('spotify_token_expires', expires);
    if (data.refresh_token) sessionStorage.setItem('spotify_refresh', data.refresh_token);
    return data.access_token;
  }
  throw new Error('Token exchange failed: ' + JSON.stringify(data));
}

function logout() {
  accessToken = null;
  sessionStorage.clear();
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

// ── API ──
async function api(endpoint) {
  const res = await fetch('https://api.spotify.com/v1' + endpoint, {
    headers: { Authorization: 'Bearer ' + accessToken }
  });
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

async function fetchAllPages(endpoint) {
  let items = [], url = endpoint;
  while (url) {
    const full = url.startsWith('http') ? url : 'https://api.spotify.com/v1' + url;
    const res = await fetch(full, { headers: { Authorization: 'Bearer ' + accessToken } });
    const data = await res.json();
    items = items.concat(data.items || []);
    url = data.next || null;
  }
  return items;
}

// ── INIT ──
async function init() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  if (code) {
    window.history.replaceState(null, '', window.location.pathname);
    try {
      accessToken = await exchangeCode(code);
    } catch(e) {
      alert('Erro ao autenticar: ' + e.message);
      return;
    }
  } else {
    const stored = sessionStorage.getItem('spotify_token');
    const expires = Number(sessionStorage.getItem('spotify_token_expires') || 0);
    if (stored && Date.now() < expires) {
      accessToken = stored;
    }
  }

  if (!accessToken) return;

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';

  try {
    const me = await api('/me');
    document.getElementById('user-name').textContent = me.display_name;
    if (me.images && me.images[0]) document.getElementById('user-avatar').src = me.images[0].url;
    await loadPlaylists();
  } catch(e) { logout(); }
}

// ── PLAYLISTS ──
async function loadPlaylists() {
  const grid = document.getElementById('playlists-grid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div> Carregando playlists…</div>';
  const items = await fetchAllPages('/me/playlists?limit=50');
  grid.innerHTML = '';
  items.forEach(pl => {
    const card = document.createElement('div');
    card.className = 'playlist-card';
    card.dataset.id = pl.id;
    card.onclick = () => selectPlaylist(pl.id, pl.name, card);
    const img = pl.images && pl.images[0]
      ? `<img class="playlist-cover" src="${pl.images[0].url}" alt="${pl.name}" loading="lazy"/>`
      : `<div class="playlist-cover-placeholder"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>`;
    card.innerHTML = `${img}<div class="playlist-name">${pl.name}</div><div class="playlist-count">${pl.tracks.total} músicas</div>`;
    grid.appendChild(card);
  });
}

// ── TRACKS ──
async function selectPlaylist(id, name, cardEl) {
  document.querySelectorAll('.playlist-card').forEach(c => c.classList.remove('active'));
  cardEl.classList.add('active');
  const section = document.getElementById('tracks-section');
  section.style.display = 'block';
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.getElementById('tracks-container').innerHTML = '<div class="loading"><div class="spinner"></div> Carregando músicas…</div>';
  document.getElementById('search-input').value = '';
  const items = await fetchAllPages(`/playlists/${id}/tracks?limit=100`);
  allTracks = items.filter(i => i.track && i.track.id).map(i => i.track);
  filterTracks();
}

function filterTracks() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const sort = document.getElementById('sort-select').value;
  let filtered = allTracks.filter(t => {
    if (!q) return true;
    const name = (t.name || '').toLowerCase();
    const artist = (t.artists || []).map(a => a.name).join(' ').toLowerCase();
    const album = (t.album?.name || '').toLowerCase();
    return name.includes(q) || artist.includes(q) || album.includes(q);
  });
  if (sort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === 'artist') filtered.sort((a,b) => (a.artists[0]?.name||'').localeCompare(b.artists[0]?.name||''));
  else if (sort === 'album') filtered.sort((a,b) => (a.album?.name||'').localeCompare(b.album?.name||''));
  else if (sort === 'duration') filtered.sort((a,b) => a.duration_ms - b.duration_ms);
  document.getElementById('results-count').textContent = `${filtered.length} de ${allTracks.length} músicas`;
  renderTracks(filtered);
}

function msToTime(ms) {
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function renderTracks(tracks) {
  const container = document.getElementById('tracks-container');
  if (tracks.length === 0) {
    container.innerHTML = `<div class="empty-state"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>Nenhuma música encontrada</p></div>`;
    return;
  }
  const rows = tracks.map((t, i) => {
    const artist = (t.artists || []).map(a => a.name).join(', ');
    const thumb = t.album?.images?.[2]?.url || t.album?.images?.[0]?.url || '';
    const album = t.album?.name || '';
    const duration = msToTime(t.duration_ms);
    const url = t.external_urls?.spotify || '#';
    return `<tr class="track-row">
      <td class="track-num">${i+1}</td>
      <td><div class="track-info">
        ${thumb ? `<img class="track-thumb" src="${thumb}" alt="" loading="lazy"/>` : '<div class="track-thumb"></div>'}
        <div><div class="track-title">${t.name}</div><div class="track-artist">${artist}</div></div>
      </div></td>
      <td class="track-album">${album}</td>
      <td class="track-duration">${duration}</td>
      <td><a class="track-link" href="${url}" target="_blank" title="Abrir no Spotify">▶</a></td>
    </tr>`;
  }).join('');
  container.innerHTML = `<table class="tracks-table"><thead><tr><th>#</th><th>Música</th><th>Álbum</th><th>Duração</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}

init();
</script>
</body>
</html>
